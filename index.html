      tailwind.config = {
        theme: {

    <script>
      // Enhanced Polyfills for browser environment
      window.process = { 
        env: { NODE_ENV: 'production' }, 
        browser: true, 
        version: '',
        cwd: () => '/',
        platform: 'browser'
      };
      window.global = window;
      
      // Buffer Polyfill
      window.Buffer = {
        isBuffer: () => false,
        from: (data) => data instanceof Uint8Array ? data : new Uint8Array(data || 0),
        alloc: (size) => new Uint8Array(size),
        concat: (arr) => {
            const total = arr.reduce((acc, curr) => acc + curr.length, 0);
            const res = new Uint8Array(total);
            let offset = 0;
            for(const a of arr) { res.set(a, offset); offset += a.length; }
            return res;
        }
      };

      // Mock 'require' to prevent "Dynamic require of 'fs' is not supported" errors
      window.require = (moduleName) => {
        if (['fs', 'path', 'os', 'crypto', 'stream', 'util', 'events', 'child_process'].includes(moduleName)) {
           return {};
        }
        console.warn(`Blocked dynamic require for: ${moduleName}`);
        return {};
      };
    </script>
